<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Планировщик IG</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f1b;color:#f1f5f9;font-family:sans-serif;padding:15px;padding-top:70px}
header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;position:fixed;top:0;left:0;right:0;padding:15px;background:rgba(15,15,27,0.95);backdrop-filter:blur(10px);z-index:100}
h1{margin:0;font-size:20px;background:linear-gradient(90deg,#7c3aed,#ec4899);-webkit-background-clip:text;color:transparent}
.stats{display:flex;justify-content:space-around;background:#1a1a2e;padding:15px;border-radius:15px;margin-bottom:20px}
.card{background:#1a1a2e;padding:15px;border-radius:15px;margin-bottom:15px;position:relative}
.badge{position:absolute;top:-10px;right:-10px;background:#ef4444;color:#fff;padding:5px 10px;border-radius:15px;font-size:12px}
.row{display:flex;justify-content:space-between;margin:5px 0;font-size:14px}
.lbl{color:#94a3b8}
.btn{width:100%;padding:12px;background:#7c3aed;color:#fff;border:none;border-radius:10px;margin-top:10px;font-size:16px;cursor:pointer;font-weight:600}
.btn:disabled{background:#475569;opacity:0.5;cursor:not-allowed}
.btn.done{background:#22c55e;opacity:0.8}
.btn.overdue{background:#ef4444}
.btn.locked{background:#475569}
.hint{text-align:center;color:#64748b;font-size:12px;margin-top:30px}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(100px);background:#334155;padding:15px 25px;border-radius:20px;opacity:0;transition:0.3s;z-index:1000;max-width:90%;text-align:center}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}
#toast.warning{background:#ef4444}
a{text-decoration:none}
.loading{text-align:center;padding:40px;color:#64748b}
</style>
</head>
<body>
<header>
<h1>Планировщик IG</h1>
<button id="notifBtn" style="background:#f59e0b;border:none;padding:5px 10px;border-radius:20px;cursor:pointer">🔔</button>
</header>
<main>
<div class="stats">
<div><b id="readyCount">0</b><br>Готов</div>
<div><b id="tomorrowCount">0</b><br>Завтра</div>
</div>
<div id="list"><div class="loading">Загрузка...</div></div>
<p class="hint">Данные синхронизируются с облаком ☁️</p>
</main>
<div id="toast"></div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getFirestore, collection, setDoc, doc, onSnapshot, getDocs } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

// 🔥 ТВОЙ FIREBASE CONFIGconst firebaseConfig = {
  apiKey: "AIzaSyDxVsXvX9HMS2eq1y1wMI2ogEQ_K4rUR3c",
  authDomain: "instagram-planner-19e7c.firebaseapp.com",
  projectId: "instagram-planner-19e7c",
  storageBucket: "instagram-planner-19e7c.firebasestorage.app",
  messagingSenderId: "657952242785",
  appId: "1:657952242785:web:5e12f55dd31c71b4e5be20"
};

// Инициализация
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const COLLECTION = "instagram_accounts";

// Исходные аккаунты
const ACCS = [
  {id:'e1',name:'Евгений ИИ',handle:'@evgeny__ai',niche:'AI',link:'https://instagram.com/evgeny__ai'},
  {id:'m1',name:'Mia Creates',handle:'@mia.creates.ai26',niche:'Skating',link:'https://instagram.com/mia.creates.ai26'},
  {id:'l1',name:'LiWei',handle:'@liwei_zdorovie',niche:'Qigong',link:'https://instagram.com/liwei_zdorovie'}
];

// === ДАТЫ ===
function toLocalDateStr(date) {
  const d = new Date(date);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function addDaysToDateStr(dateStr, days) {
  const [y, m, d] = dateStr.split('-').map(Number);
  const date = new Date(y, m-1, d);
  date.setDate(date.getDate() + days);
  return toLocalDateStr(date);
}
function daysDiffDateStr(dateStr1, dateStr2) {
  const [y1, m1, d1] = dateStr1.split('-').map(Number);
  const [y2, m2, d2] = dateStr2.split('-').map(Number);
  return Math.floor((new Date(y2,m2-1,d2) - new Date(y1,m1-1,d1)) / (1000*60*60*24));
}
function formatDisplayDate(dateStr) {
  const [y, m, d] = dateStr.split('-');
  return `${d}.${m}`;
}

// === UI ===
function showToast(msg, isWarning){
  const t = document.getElementById('toast');
  t.innerText = msg;
  t.className = isWarning ? 'show warning' : 'show';
  setTimeout(() => t.className = '', 3000);
}
// === РЕНДЕР ===
function render(data){
  const list = document.getElementById('list');
  list.innerHTML = '';
  
  let r = 0, t = 0;
  const todayStr = toLocalDateStr(new Date());
  
  data.forEach(acc => {
    let nextStr = acc.last ? addDaysToDateStr(acc.last, 3) : todayStr;
    const diffDays = daysDiffDateStr(todayStr, nextStr);
    
    let status;
    if (diffDays < 0) status = 'overdue';
    else if (diffDays === 0) status = (acc.last === todayStr) ? 'done' : 'ready';
    else status = 'wait';
    
    if (status === 'ready' || status === 'overdue') r++;
    if (status === 'wait' && diffDays === 1) t++;
    
    const badge = status === 'overdue' ? '<div class="badge">!</div>' : '';
    const isDisabled = status === 'wait' || status === 'done';
    
    const btnText = {
      'done': '✓ ВЫПОЛНЕНО',
      'ready': '📤 ОТПУБЛИКОВАТЬ',
      'overdue': '⚠️ ПРОСРОЧЕНО',
      'wait': '⏳ ЧЕРЕЗ ' + diffDays + ' ДН.'
    }[status];
    
    const btnClass = {
      'done': 'btn done',
      'ready': 'btn',
      'overdue': 'btn overdue',
      'wait': 'btn locked'
    }[status];
    
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      ${badge}
      <h3 style="margin:0"><a href="${acc.link}" target="_blank" style="color:#fff">${acc.name}</a></h3>
      <p style="color:#94a3b8;margin:5px 0">${acc.handle}</p>
      <div class="row"><span class="lbl">След. пост:</span><span>${formatDisplayDate(nextStr)}</span></div>
      <div class="row"><span class="lbl">Через:</span><span style="color:${status === 'ready' ? '#22c55e' : status === 'overdue' ? '#ef4444' : '#fff'}">${diffDays} дн.</span></div>
      <button class="${btnClass}" data-id="${acc.id}" ${isDisabled ? 'disabled' : ''}>${btnText}</button>
    `;
    list.appendChild(card);
  });
    document.getElementById('readyCount').innerText = r;
  document.getElementById('tomorrowCount').innerText = t;
  
  document.querySelectorAll('.btn:not(:disabled)').forEach(btn => {
    btn.onclick = () => doPost(btn.dataset.id);
  });
}

// === ПОСТ ===
window.doPost = async function(id){
  const todayStr = toLocalDateStr(new Date());
  try {
    await setDoc(doc(db, COLLECTION, id), { last: todayStr }, { merge: true });
    showToast('✓ Отмечено! Следующий пост через 3 дня.');
    if (navigator.vibrate) navigator.vibrate(50);
  } catch (e) {
    console.error(e);
    showToast('Ошибка сохранения', true);
  }
};

// === ПОДПИСКА ===
async function subscribeToUpdates(){
  const colRef = collection(db, COLLECTION);
  
  try {
    // Проверяем, пустая ли база
    const snapshot = await getDocs(colRef);
    
    if (snapshot.empty) {
      // Создаём дефолтные аккаунты
      for (const acc of ACCS) {
        await setDoc(doc(db, COLLECTION, acc.id), {
          name: acc.name,
          handle: acc.handle,
          niche: acc.niche,
          link: acc.link,
          last: null,
          createdAt: new Date().toISOString()
        }, { merge: true });
      }
    }
    
    // Подписываемся на изменения
    onSnapshot(colRef, (snapshot) => {
      const data = [];
      snapshot.forEach(d => data.push({ id: d.id, ...d.data() }));
      render(data);
      checkTomorrow(data);
    });    
  } catch (error) {
    console.error('Ошибка:', error);
    document.getElementById('list').innerHTML = `
      <div class="loading" style="color:#ef4444">
        ❌ Ошибка подключения к Firebase<br><br>
        <small>Открой консоль (F12) для деталей</small>
      </div>
    `;
  }
}

// === ЗАВТРА ===
function checkTomorrow(data){
  const todayStr = toLocalDateStr(new Date());
  const tomorrowPosts = data
    .filter(acc => acc.last && daysDiffDateStr(todayStr, addDaysToDateStr(acc.last, 3)) === 1)
    .map(acc => acc.name);
  
  if (tomorrowPosts.length > 0) {
    showToast('🔔 ЗАВТРА ПУБЛИКАЦИЯ:\n' + tomorrowPosts.join(', '), true);
  }
}

// === СТАРТ ===
document.getElementById('notifBtn').onclick = () => showToast('Планировщик готов!');
subscribeToUpdates();
</script>
</body>
</html>
